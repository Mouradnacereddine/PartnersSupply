<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628" />
      <stop offset="100%" stop-color="#142c4b" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c45a" />
      <stop offset="100%" stop-color="#c8962e" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="500" fill="url(#bgGrad)"/>
  <rect width="800" height="500" fill="url(#grid)"/>

  <!-- Glowing atmospheric lights -->
  <circle cx="400" cy="250" r="200" fill="rgba(200, 150, 46, 0.05)" filter="blur(60px)" />

  <!-- Industrial grid design -->
  <!-- Box 1: Supply Chain -->
  <g transform="translate(100, 150)" stroke="rgba(255,255,255,0.1)" stroke-width="1" fill="none">
    <rect x="0" y="0" width="160" height="180" rx="10" />
    <rect x="0" y="0" width="160" height="180" rx="10" fill="rgba(255, 255, 255, 0.01)" />
    <!-- Icon representation -->
    <path d="M 50 70 L 80 50 L 110 70 L 80 90 Z" stroke="url(#goldGrad)" stroke-width="2" />
    <path d="M 50 70 L 50 100 L 80 120 L 80 90" stroke="url(#goldGrad)" stroke-width="1.5" />
    <path d="M 110 70 L 110 100 L 80 120" stroke="url(#goldGrad)" stroke-width="1.5" />
    <circle cx="80" cy="35" r="4" fill="#fff" opacity="0.5" />
    <circle cx="50" cy="140" r="3" fill="#fff" opacity="0.3" />
    <circle cx="110" cy="140" r="3" fill="#fff" opacity="0.3" />
  </g>
  <text x="180" y="360" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Supply Chain</text>

  <!-- Flow Arrow -->
  <path d="M 290 240 L 330 240" stroke="rgba(200, 150, 46, 0.5)" stroke-width="2" fill="none" marker-end="url(#arrow)" />
  
  <!-- Box 2: Logistique -->
  <g transform="translate(320, 150)" stroke="rgba(255,255,255,0.1)" stroke-width="1" fill="none">
    <rect x="0" y="0" width="160" height="180" rx="10" />
    <rect x="0" y="0" width="160" height="180" rx="10" fill="rgba(255, 255, 255, 0.01)" />
    <!-- Icon representation -->
    <path d="M 45 80 L 100 80 L 115 100 L 115 115 L 45 115 Z" stroke="url(#goldGrad)" stroke-width="2" />
    <circle cx="60" cy="120" r="8" stroke="url(#goldGrad)" stroke-width="2" />
    <circle cx="100" cy="120" r="8" stroke="url(#goldGrad)" stroke-width="2" />
    <path d="M 75 80 L 75 60 L 95 60" stroke="#fff" stroke-width="1.5" />
    <rect x="55" y="65" width="15" height="15" fill="none" stroke="#fff" stroke-width="1.5" />
  </g>
  <text x="400" y="360" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Logistique</text>

  <!-- Flow Arrow -->
  <path d="M 510 240 L 550 240" stroke="rgba(200, 150, 46, 0.5)" stroke-width="2" fill="none" />

  <!-- Box 3: Expédition -->
  <g transform="translate(540, 150)" stroke="rgba(255,255,255,0.1)" stroke-width="1" fill="none">
    <rect x="0" y="0" width="160" height="180" rx="10" />
    <rect x="0" y="0" width="160" height="180" rx="10" fill="rgba(255, 255, 255, 0.01)" />
    <!-- Icon representation -->
    <path d="M 40 100 C 40 100 50 60 80 60 C 110 60 120 100 120 100 L 115 110 L 45 110 Z" stroke="url(#goldGrad)" stroke-width="2" />
    <line x1="30" y1="110" x2="130" y2="110" stroke="#fff" stroke-width="2" />
    <path d="M 80 60 L 80 40" stroke="#fff" stroke-width="1.5" />
    <!-- waves -->
    <path d="M 50 120 Q 60 115 70 120 T 90 120 T 110 120" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" />
  </g>
  <text x="620" y="360" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle">Expédition</text>

  <!-- Decorative technical lines -->
  <line x1="50" y1="80" x2="750" y2="80" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
  <line x1="50" y1="420" x2="750" y2="420" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
</svg>
