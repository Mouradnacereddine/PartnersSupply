<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628" />
      <stop offset="100%" stop-color="#142c4b" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c45a" />
      <stop offset="100%" stop-color="#c8962e" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="800" height="500" fill="url(#bgGrad)"/>
  <rect width="800" height="500" fill="url(#grid)"/>

  <!-- Glowing atmospheric light -->
  <circle cx="400" cy="250" r="200" fill="rgba(200, 150, 46, 0.05)" filter="blur(60px)" />

  <!-- Top decorative line -->
  <line x1="50" y1="80" x2="750" y2="80" stroke="rgba(255,255,255,0.05)" stroke-width="1" />
  <line x1="50" y1="420" x2="750" y2="420" stroke="rgba(255,255,255,0.05)" stroke-width="1" />

  <!-- Title -->
  <text x="400" y="120" fill="#fff" font-family="Arial,sans-serif" font-size="20" font-weight="bold" text-anchor="middle" letter-spacing="4">NOTRE PARCOURS</text>
  <line x1="310" y1="132" x2="490" y2="132" stroke="url(#goldGrad)" stroke-width="1.5" />

  <!-- ============================================ -->
  <!-- BOX 1: 2006 — Création -->
  <!-- ============================================ -->
  <g transform="translate(60, 160)" stroke="rgba(255,255,255,0.12)" stroke-width="1" fill="none">
    <rect x="0" y="0" width="200" height="220" rx="10" />
    <rect x="0" y="0" width="200" height="220" rx="10" fill="rgba(255, 255, 255, 0.02)" />
    
    <!-- Top accent line -->
    <line x1="0" y1="0" x2="200" y2="0" stroke="url(#goldGrad)" stroke-width="2" />

    <!-- Building / HQ icon -->
    <g transform="translate(80, 50)" stroke="url(#goldGrad)" stroke-width="2">
      <rect x="0" y="25" width="40" height="40" rx="3" />
      <rect x="5" y="30" width="12" height="15" />
      <rect x="23" y="30" width="12" height="15" />
      <rect x="5" y="50" width="30" height="15" />
      <path d="M 0 25 L 20 8 L 40 25" />
    </g>

    <text x="100" y="130" fill="#f0d060" font-family="Arial,sans-serif" font-size="14" font-weight="bold" text-anchor="middle">2006</text>
    <text x="100" y="150" fill="#fff" font-family="Arial,sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Création</text>
    <text x="100" y="170" fill="rgba(255,255,255,0.5)" font-family="Arial,sans-serif" font-size="10" text-anchor="middle">Groupe TRANSPROJETS</text>
    <text x="100" y="185" fill="rgba(255,255,255,0.4)" font-family="Arial,sans-serif" font-size="10" text-anchor="middle">Siège social : Paris</text>
  </g>

  <!-- Flow Arrow 1 -->
  <g fill="url(#goldGrad)">
    <path d="M 280 270 L 315 270" stroke="rgba(200,150,46,0.5)" stroke-width="2" />
    <polygon points="318,270 308,265 308,275" />
  </g>

  <!-- ============================================ -->
  <!-- BOX 2: 2013 — Division MINING OIL & GAS -->
  <!-- ============================================ -->
  <g transform="translate(300, 160)" stroke="rgba(255,255,255,0.12)" stroke-width="1" fill="none">
    <rect x="0" y="0" width="200" height="220" rx="10" />
    <rect x="0" y="0" width="200" height="220" rx="10" fill="rgba(255, 255, 255, 0.02)" />
    
    <!-- Top accent line -->
    <line x1="0" y1="0" x2="200" y2="0" stroke="url(#goldGrad)" stroke-width="2" />

    <!-- Mining / Oil icon -->
    <g transform="translate(75, 40)" fill="none" stroke="url(#goldGrad)" stroke-width="2">
      <!-- Derrick / tower -->
      <path d="M 25 10 L 10 60 L 40 60 Z" />
      <line x1="25" y1="10" x2="25" y2="60" />
      <line x1="15" y1="35" x2="35" y2="35" />
      <!-- Ground -->
      <line x1="5" y1="60" x2="45" y2="60" />
      <!-- Drop -->
      <path d="M 25 65 C 25 65 30 72 30 75 C 30 78 28 80 25 80 C 22 80 20 78 20 75 C 20 72 25 65 25 65 Z" />
    </g>

    <text x="100" y="130" fill="#f0d060" font-family="Arial,sans-serif" font-size="14" font-weight="bold" text-anchor="middle">2013</text>
    <text x="100" y="150" fill="#fff" font-family="Arial,sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Mining Oil &amp; Gas</text>
    <text x="100" y="170" fill="rgba(255,255,255,0.5)" font-family="Arial,sans-serif" font-size="10" text-anchor="middle">Division dédiée</text>
    <text x="100" y="185" fill="rgba(255,255,255,0.4)" font-family="Arial,sans-serif" font-size="10" text-anchor="middle">Afrique &amp; Moyen-Orient</text>
  </g>

  <!-- Flow Arrow 2 -->
  <g fill="url(#goldGrad)">
    <path d="M 520 270 L 555 270" stroke="rgba(200,150,46,0.5)" stroke-width="2" />
    <polygon points="558,270 548,265 548,275" />
  </g>

  <!-- ============================================ -->
  <!-- BOX 3: Aujourd'hui — International -->
  <!-- ============================================ -->
  <g transform="translate(540, 160)" stroke="rgba(255,255,255,0.12)" stroke-width="1" fill="none">
    <rect x="0" y="0" width="200" height="220" rx="10" />
    <rect x="0" y="0" width="200" height="220" rx="10" fill="rgba(255, 255, 255, 0.02)" />
    
    <!-- Top accent line -->
    <line x1="0" y1="0" x2="200" y2="0" stroke="url(#goldGrad)" stroke-width="2" />

    <!-- Globe / Network icon -->
    <g transform="translate(70, 42)" fill="none" stroke="url(#goldGrad)" stroke-width="2">
      <circle cx="30" cy="30" r="22" />
      <ellipse cx="30" cy="30" rx="12" ry="22" />
      <line x1="8" y1="30" x2="52" y2="30" />
      <line x1="12" y1="18" x2="48" y2="18" />
      <line x1="12" y1="42" x2="48" y2="42" />
      <!-- Connecting nodes -->
      <circle cx="18" cy="20" r="3" fill="#f0d060" />
      <circle cx="42" cy="35" r="3" fill="#f0d060" />
      <line x1="18" y1="20" x2="42" y2="35" stroke-dasharray="3,3" />
    </g>

    <text x="100" y="130" fill="#f0d060" font-family="Arial,sans-serif" font-size="14" font-weight="bold" text-anchor="middle">AUJOURD'HUI</text>
    <text x="100" y="150" fill="#fff" font-family="Arial,sans-serif" font-size="13" font-weight="bold" text-anchor="middle">Présence Internationale</text>
    <text x="100" y="170" fill="rgba(255,255,255,0.5)" font-family="Arial,sans-serif" font-size="10" text-anchor="middle">500+ clients · 15 pays</text>
    <text x="100" y="185" fill="rgba(255,255,255,0.4)" font-family="Arial,sans-serif" font-size="10" text-anchor="middle">8 experts dédiés</text>
  </g>

  <!-- Bottom stats strip -->
  <g transform="translate(140, 430)">
    <rect x="0" y="0" width="120" height="30" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" />
    <text x="60" y="20" text-anchor="middle" fill="#f0d060" font-family="Arial,sans-serif" font-size="13" font-weight="bold">Pièces Stellantis</text>
  </g>
  <g transform="translate(280, 430)">
    <rect x="0" y="0" width="110" height="30" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" />
    <text x="55" y="20" text-anchor="middle" fill="#f0d060" font-family="Arial,sans-serif" font-size="13" font-weight="bold">Équipements</text>
  </g>
  <g transform="translate(410, 430)">
    <rect x="0" y="0" width="90" height="30" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" />
    <text x="45" y="20" text-anchor="middle" fill="#f0d060" font-family="Arial,sans-serif" font-size="13" font-weight="bold">Mining</text>
  </g>
  <g transform="translate(520, 430)">
    <rect x="0" y="0" width="120" height="30" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.08)" />
    <text x="60" y="20" text-anchor="middle" fill="#f0d060" font-family="Arial,sans-serif" font-size="13" font-weight="bold">Oil &amp; Gas</text>
  </g>
</svg>
