<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="100%" height="100%">
  <defs>
    <!-- Sky/Oceanic gradients -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07111e" />
      <stop offset="60%" stop-color="#0f2239" />
      <stop offset="100%" stop-color="#142c4b" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3d078" />
      <stop offset="100%" stop-color="#c8962e" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.08)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.02)" />
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Base Background -->
  <rect width="1000" height="600" fill="url(#skyGrad)"/>
  <rect width="1000" height="600" fill="url(#grid)"/>

  <!-- Atmospheric Glows -->
  <circle cx="850" cy="150" r="300" fill="rgba(200, 150, 46, 0.06)" filter="blur(80px)" />
  <circle cx="150" cy="450" r="250" fill="rgba(45, 109, 164, 0.08)" filter="blur(70px)" />

  <!-- Global Connection Mesh / Trade Network -->
  <g opacity="0.35">
    <path d="M 100 250 L 250 180 L 400 280 L 550 200 L 750 320 L 900 230" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5" />
    <path d="M 250 180 L 350 400 L 600 420 L 750 320" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" stroke-dasharray="4,4" />
    <path d="M 100 250 L 300 450 L 550 200" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.2" />
    
    <circle cx="100" cy="250" r="4" fill="#fff" />
    <circle cx="250" cy="180" r="5" fill="url(#goldGrad)" />
    <circle cx="400" cy="280" r="4" fill="#fff" />
    <circle cx="550" cy="200" r="6" fill="url(#goldGrad)" />
    <circle cx="750" cy="320" r="5" fill="#fff" />
    <circle cx="900" cy="230" r="4" fill="#fff" />
    <circle cx="350" cy="400" r="5" fill="url(#goldGrad)" />
    <circle cx="600" cy="420" r="4" fill="#fff" />
  </g>

  <!-- Big abstract glowing globes -->
  <path d="M 680 150 A 180 180 0 0 1 920 450" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1.5" />
  <path d="M 620 300 A 240 240 0 0 0 980 300" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="1.2" />

  <!-- Horizontal Divider / Horizon -->
  <line x1="50" y1="480" x2="950" y2="480" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" />

  <!-- Dynamic HUD-like Tech Circle -->
  <g transform="translate(800, 300)">
    <circle cx="0" cy="0" r="140" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="4" />
    <circle cx="0" cy="0" r="120" fill="none" stroke="rgba(200, 150, 46, 0.12)" stroke-width="1.5" stroke-dasharray="10,25" />
    <circle cx="0" cy="0" r="90" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1" />
    <circle cx="0" cy="0" r="60" fill="none" stroke="url(#goldGrad)" stroke-width="2" stroke-dasharray="120,40" opacity="0.6" />
    <circle cx="0" cy="0" r="6" fill="url(#goldGrad)" />
  </g>

  <!-- Logistics & Transport Visuals (Right-bottom side) -->
  <!-- Cargo Ship Silhouette -->
  <g transform="translate(480, 435)" opacity="0.85">
    <!-- Ship Hull -->
    <polygon points="120,45 150,20 250,20 270,45" fill="#091422" stroke="rgba(255,255,255,0.15)" stroke-width="1" />
    <!-- Bridge / Superstructure -->
    <rect x="220" y="3" width="25" height="18" fill="#142c4b" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
    <rect x="225" y="-5" width="10" height="9" fill="#0a1628" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
    <!-- Cargo Containers -->
    <rect x="130" y="5" width="22" height="16" fill="url(#goldGrad)" rx="1" />
    <rect x="154" y="2" width="28" height="19" fill="#1b3b5f" stroke="rgba(255,255,255,0.2)" stroke-width="1" rx="1" />
    <rect x="184" y="8" width="18" height="13" fill="url(#goldGrad)" rx="1" />
    <rect x="204" y="5" width="14" height="16" fill="#142c4b" stroke="rgba(255,255,255,0.2)" stroke-width="1" rx="1" />
  </g>

  <!-- Transport Airplane Silhouette (top left, flying towards center-right) -->
  <g transform="translate(180, 100) rotate(12) scale(0.7)" opacity="0.6">
    <!-- Fuselage -->
    <path d="M 0 15 C 20 15 80 10 100 0 C 110 -5 120 -5 125 0 C 127 2 120 15 100 22 C 80 27 20 25 0 25 Z" fill="#fff" />
    <!-- Main Wing -->
    <polygon points="50,18 25,65 40,70 75,21" fill="url(#goldGrad)" />
    <!-- Tail Fin -->
    <polygon points="10,14 -10,-15 2,-15 20,13" fill="#fff" />
    <!-- Engine -->
    <rect x="42" y="32" width="15" height="7" fill="#142c4b" rx="2" stroke="rgba(255,255,255,0.3)" />
  </g>

  <!-- Professional UI Framing / Grid overlays -->
  <rect x="20" y="20" width="960" height="560" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1" />
  <!-- Corner marks -->
  <path d="M 20 40 L 20 20 L 40 20" fill="none" stroke="url(#goldGrad)" stroke-width="2" />
  <path d="M 980 40 L 980 20 L 960 20" fill="none" stroke="url(#goldGrad)" stroke-width="2" />
  <path d="M 20 560 L 20 580 L 40 580" fill="none" stroke="url(#goldGrad)" stroke-width="2" />
  <path d="M 980 560 L 980 580 L 960 580" fill="none" stroke="url(#goldGrad)" stroke-width="2" />
</svg>
